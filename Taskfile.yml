version: "3"

vars:
  BIN: mat
  IMAGE: mat:local

tasks:
  default:
    desc: タスク一覧
    cmds:
      - task --list
    silent: true

  build:
    desc: リリースビルド → target/release/mat
    cmds:
      - cargo build --release

  install:
    desc: ~/.cargo/bin にインストール
    cmds:
      - cargo install --path . --force

  run:
    desc: "実行（chip-tool が PATH 上に必要）。例: task run -- discover"
    cmds:
      - cargo run -- {{.CLI_ARGS}}

  test:
    desc: テスト（ダミー chip-tool 統合テスト含む。実 chip-tool 不要）
    cmds:
      - cargo test

  clippy:
    desc: Lint（-D warnings）
    cmds:
      - cargo clippy --all-targets -- -D warnings

  fmt:
    desc: 整形
    cmds:
      - cargo fmt

  fmt:check:
    desc: 整形チェック（CI）
    cmds:
      - cargo fmt --check

  check:
    desc: CI 相当（fmt:check + clippy + test）
    cmds:
      - task: fmt:check
      - task: clippy
      - task: test

  chip:extract:
    desc: chip-tool を Docker でビルドし ./chip-tool に取り出す（Docker 経由せず直接実行用）
    cmds:
      - docker build --target chip-builder -t mat-chip-builder .
      - |
        id=$(docker create mat-chip-builder)
        docker cp "$id:/work/connectedhomeip/out/chip-tool" ./chip-tool
        docker rm "$id"
      - 'echo "取り出し完了: $PWD/chip-tool"'
      - 'echo "ランタイム依存: sudo apt-get install -y libssl3 libdbus-1-3 libglib2.0-0 libavahi-client3"'
      - 'echo "実行: export MAT_CHIP_TOOL_BIN=$PWD/chip-tool"'

  chip:extract:arm64:
    desc: arm64(aarch64) 版 chip-tool + mat をクロスビルドし ./dist/arm64/ に取り出す（Pi3 等実機へ scp 用）
    cmds:
      - docker build --target chip-builder-arm64 -t mat-chip-builder-arm64 .
      - docker build --target mat-builder-arm64 -t mat-mat-builder-arm64 .
      - mkdir -p dist/arm64
      - |
        id=$(docker create mat-chip-builder-arm64)
        docker cp "$id:/work/connectedhomeip/out/linux-arm64-chip-tool-clang/chip-tool" ./dist/arm64/chip-tool
        docker rm "$id"
      - |
        id=$(docker create mat-mat-builder-arm64)
        docker cp "$id:/src/target/aarch64-unknown-linux-gnu/release/mat" ./dist/arm64/mat
        docker rm "$id"
      - 'echo "取り出し完了: $PWD/dist/arm64/{chip-tool,mat}"'
      - 'echo "実機へ転送: scp dist/arm64/chip-tool dist/arm64/mat jarvis:~/"'
      - 'echo "実機ランタイム依存: sudo apt-get install -y libssl3 libdbus-1-3 libglib2.0-0 libavahi-client3 avahi-daemon"'
      - 'echo "実機実行: export MAT_CHIP_TOOL_BIN=~/chip-tool && ~/mat discover"'

  docker:build:
    desc: x86 UGREEN 向けイメージビルド（chip-tool 同梱）
    cmds:
      - docker build -t {{.IMAGE}} .

  docker:run:
    desc: "Docker 実行（host networking 必須）。例: task docker:run -- discover"
    cmds:
      - docker run --rm --network host -v mat-store:/root/.config/mat {{.IMAGE}} {{.CLI_ARGS}}

  docker:test:
    desc: ローカルツールチェーン不要のテスト（ビルドステージ内で cargo test）
    cmds:
      - docker build --target test .
