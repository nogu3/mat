version: "3"

vars:
  BIN: mat
  IMAGE: mat:local

tasks:
  default:
    desc: タスク一覧
    cmds:
      - task --list
    silent: true

  build:
    desc: リリースビルド → target/release/{mat,matd}
    cmds:
      - cargo build --release

  install:
    desc: ~/.cargo/bin にインストール（mat / matd 両方）
    cmds:
      - cargo install --path crates/mat --force
      - cargo install --path crates/matd --force

  run:
    desc: "実行（native バックエンド。例: task run -- discover）"
    cmds:
      - cargo run -- {{.CLI_ARGS}}

  test:
    desc: テスト（native FakeConn + バイナリ統合テスト。実デバイス不要）
    cmds:
      - cargo test

  clippy:
    desc: Lint（-D warnings）
    cmds:
      - cargo clippy --all-targets -- -D warnings

  fmt:
    desc: 整形
    cmds:
      - cargo fmt

  fmt:check:
    desc: 整形チェック（CI）
    cmds:
      - cargo fmt --check

  check:
    desc: CI 相当（fmt:check + clippy + test）
    cmds:
      - task: fmt:check
      - task: clippy
      - task: test

  dist:arm64:
    desc: "aarch64 gnu + BLE の deploy 成果物を ./dist/arm64/ に作る（jarvis 用標準ビルド）"
    cmds:
      - cross build --release --target aarch64-unknown-linux-gnu --features ble
      - mkdir -p dist/arm64
      - cp target/aarch64-unknown-linux-gnu/release/mat target/aarch64-unknown-linux-gnu/release/matd dist/arm64/
      - 'echo "実機ランタイム依存: libdbus-1-3（BLE 用）。scp dist/arm64/{mat,matd} <host>:~/"'

  e2e:m8c3:real:
    desc: "M8c-3 実機 E2E（jarvis）。STAGE=1 既定 / STAGE=2 は撤去後の最終受け入れ"
    cmds:
      - bash scripts/e2e-m8c3-real.sh

  docker:build:
    desc: x86_64 Linux 向けイメージビルド（native、mat/matd のみ）
    cmds:
      - docker build --target runtime -t {{.IMAGE}} .

  docker:run:
    desc: "Docker 実行（host networking 必須）。例: task docker:run -- discover"
    cmds:
      - docker run --rm --network host -v mat-store:/root/.config/mat {{.IMAGE}} {{.CLI_ARGS}}

  docker:test:
    desc: ローカルツールチェーン不要のテスト（ビルドステージ内で cargo test）
    cmds:
      - docker build --target test .
